# Build: arma una carpeta _site limpia (solo lo del panel) y publica eso.
# Las dependencias de la función las instala Netlify desde package.json.
[build]
  publish = "_site"
  command = "rm -rf _site && mkdir -p _site/css _site/js && cp index.html _site/ && cp css/styles.css _site/css/ && cp js/*.js _site/js/"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
